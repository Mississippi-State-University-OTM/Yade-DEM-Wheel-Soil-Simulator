stages:
  - test
  
# Use images with different versions of Yade by extending templat with image
.test_template:
  stage: test
  variables:
    OUTPUT_DIR: "out_${CI_JOB_NAME}"
    SAMPLE_PLOT_DATA: "testing/plot_default_expected_2023.txt"
  before_script:
    - set -euo pipefail
  script:
    # 0. Print info about container
    - echo "Container info:"
    - cat /etc/os-release || true
    - python3 --version || true
    # 1. Verify YADE is installed and check version
    - yade --version

    # 2. Run sipmle simulation, print to screen and file
    - mkdir -p $OUTPUT_DIR
    - yade -j8 -x -n simWheelTestRigMSSTATE.py ./testing/paramsSimpleLargeCylinder.json | tee $OUTPUT_DIR/test_simple.log
    - mv plot.txt plot.pdf exec_time.txt $OUTPUT_DIR

    # 3. Compare averaged data and show results
    - cat $OUTPUT_DIR/exec_time.txt
    - python3 ./testing/calcAvg.py $OUTPUT_DIR/plot.txt 2.0 9.0 --ref $SAMPLE_PLOT_DATA --compare Wx:6 Vz:4 Fy:6 Fz:2 Slip:4 Tx:1 z:10 | tee $OUTPUT_DIR/test_avg.log
    - cat $OUTPUT_DIR/plot_avg.txt
    - cat $OUTPUT_DIR/test_avg.log
  artifacts:
    name: ${CI_JOB_NAME}_${CI_PIPELINE_ID}
    when: always
    # This saves the log so you can download it from the GitLab UI
    paths:
      - $OUTPUT_DIR/
    expire_in: 1 week

# Create jobs for specific images by extending the template
bullseye_test:
  extends: .test_template
  image: registry.gitlab.com/yade-dev/docker-prod:debian-bullseye
  variables:
    SAMPLE_PLOT_DATA: "testing/plot_default_expected_2022.txt"

my2022p01a_test:
  extends: .test_template
  image: registry.gitlab.com/bohumir1/test:2022.01a
  variables:
    SAMPLE_PLOT_DATA: "testing/plot_default_expected_2022.txt"

bookworm_test:
  extends: .test_template
  image: registry.gitlab.com/yade-dev/docker-prod:debian-bookworm

trixie_test:
  extends: .test_template
  image: registry.gitlab.com/yade-dev/docker-prod:debian-trixie
