stages:
  - test
  
# Use images with different versions of Yade by extending templat with image
.test_template:
  stage: test
  variables:
    NTHREADS: "8"
    OUTPUT_DIR: "out_${CI_JOB_NAME}_${NTHREADS}"
    BEGT: "2.5"
    ENDT: "9"
    SAMPLE_PLOT_DATA: "testing/plot_default_expected_2023.txt"
  before_script:
    - set -euo pipefail
  script:
    # 0. Print info about container
    - echo "Container info:"
    - cat /etc/os-release || true
    - python3 --version || true
    # 1. Verify YADE is installed and check version
    - yade --version

    # 2. Run sipmle simulation, print to screen and file
    - mkdir -p $OUTPUT_DIR
    - cp $PARAM_FILE $OUTPUT_DIR
    - echo $OUTPUT_DIR $NTHREADS
    - yade -j${NTHREADS} -x -n simWheelTestRigMSSTATE.py $PARAM_FILE | tee $OUTPUT_DIR/log.report
    - cp simWheelTestRigMSSTATE.py $OUTPUT_DIR
    - mv plot.txt plot.pdf exec_time.txt $OUTPUT_DIR

    # 3. Compare averaged data and show results
    - cat $OUTPUT_DIR/exec_time.txt
    - python3 ./testing/calcAvg.py $OUTPUT_DIR/plot.txt $BEGT $ENDT --ref $SAMPLE_PLOT_DATA --compare WxR:6 Vz:4 Fx:6 Fz:4 Slip:4 GrTr:14 z:10 | tee $OUTPUT_DIR/log.compare
  artifacts:
    name: ${CI_JOB_NAME}_${CI_PIPELINE_ID}
    when: always
    # This saves the log so you can download it from the GitLab UI
    paths:
      - $OUTPUT_DIR/
    expire_in: 1 week

# Create jobs for specific images by extending the template
towed_quick_bullseye:
  extends: .test_template
  image: registry.gitlab.com/yade-dev/docker-prod:debian-bullseye
  when: manual
  variables:
    PARAM_FILE: "testing/paramsTowedLargeCylinder.json"
    SAMPLE_PLOT_DATA: "testing/plot_default_expected_2022.txt"

