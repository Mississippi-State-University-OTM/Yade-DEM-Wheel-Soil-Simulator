stages:
  - test
  
# Use images with different versions of Yade by extending templat with image
.test_template:
  stage: test
  image: registry.gitlab.com/yade-dev/docker-prod:$YADE_OS
  variables:
    YADEBUILD: "yade"
    NTHREADS: "8"
    OUTPUT_DIR: "out_${CI_JOB_ID}_${NTHREADS}"
    BEGT: "2.5"
    ENDT: "9"
    SAMPLE_PLOT_DATA: "testing/plot_towedLargeCyl_trixie_j1.txt"
  before_script:
    - set -euo pipefail
  script:
    # 0. Print info about container
    - echo "Container info:"
    - cat /etc/os-release || true
    - python3 --version || true
    - set -x
    # 1. Verify YADE is installed and check version
    - $YADEBUILD --version

    # 2. Run sipmle simulation, print to screen and file
    - mkdir "$OUTPUT_DIR"
    - cp simWheelSoilBox.py $PARAM_FILE "$OUTPUT_DIR"
    - $YADEBUILD -j${NTHREADS} -x -n simWheelSoilBox.py $PARAM_FILE | tee "$OUTPUT_DIR"/log.report
    - cat exec_time.txt
    - mv plot.txt plot.pdf exec_time.txt Data_Output.csv vis "$OUTPUT_DIR"

    # 3. Compare averaged data and show results
    - python3 ./testing/calcAvg.py "$OUTPUT_DIR"/plot.txt $BEGT $ENDT 4 --ref $SAMPLE_PLOT_DATA --compare WxR:6 Vz:4 Fx:40 Fz:4 Slip:4 GrTr:50 z:11 | tee "$OUTPUT_DIR"/log.compare

  artifacts:
    name: ${CI_JOB_NAME}_${CI_PIPELINE_ID}
    when: always
    # This saves the log so you can download it from the GitLab UI
    paths:
      - "$OUTPUT_DIR/"
    expire_in: 1 week


.matrix_yade:
  when: manual
  parallel:
    matrix:
       - YADE_OS: ["debian-trixie", "debian-bookworm", "debian-bullseye", "ubuntu22.04", "ubuntu18.04", "ubuntu16.04"]
         NTHREADS: ["1", "8"]
  variables:
    YADEBUILD: "yade"

.matrix_yadedaily:
  when: manual
  parallel:
    matrix:
       - YADE_OS: ["ubuntu24.04", "debian-bookworm", "debian-bullseye", "ubuntu18.04", "ubuntu16.04"]
         NTHREADS: ["1", "8"]
  variables:
    YADEBUILD: "yadedaily"

# Create jobs for specific images and nthreads by extending the templates
.towed_default:
  extends: .test_template
  variables:
    PARAM_FILE: "params.json"
    SAMPLE_PLOT_DATA: "testing/plot_default_2025_j1.txt"
    BEGT: "2.5"
    ENDT: "9"

.towed_quick:
  extends: .test_template
  image: registry.gitlab.com/yade-dev/docker-prod:$YADE_OS
  when: manual
  variables:
    PARAM_FILE: "testing/paramsTowedLargeCylinder.json"
    SAMPLE_PLOT_DATA: "testing/plot_towedLargeCyl_2022.txt"
    BEGT: "2.5"
    ENDT: "9"

towed_default_yade:
  extends:
    - .towed_default
    - .matrix_yade

towed_default_yadedaily:
  extends:
    - .towed_default
    - .matrix_yadedaily

towed_quick_yade:
  extends:
    - .towed_quick
    - .matrix_yade

towed_quick_yadedaily:
  extends:
    - .towed_quick
    - .matrix_yadedaily

