  variables:
    PARAM_FILE: "testing/paramsKyoto_slip6p3p.json"
    SAMPLE_PLOT_DATA: "testing/plot_Ktowed0p3mpsDtHPW_expected_2022-j8.txt"
    BEGT: "3"
